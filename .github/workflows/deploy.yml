name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: telegram-bot
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/telegram-bot/bot:$GITHUB_SHA"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

- name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --set-secrets TELEGRAM_BOT_TOKEN=tele-bot-token:latest \
            --set-secrets SHEETS_CREDENTIALS=sheet-credentials:latest \
            --set-secrets SHEETS_ID=sheets-id:latest \
            --min-instances=0 \
            --max-instances=1 \
            --memory=256Mi

      - name: Set Telegram Webhook
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format='value(status.url)')
          BOT_TOKEN=$(gcloud secrets versions access latest --secret="tele-bot-token")
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook?url=${SERVICE_URL}/webhook"
          echo "Webhook set to: ${SERVICE_URL}/webhook"